<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 5-Minute Business Brain</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f8f5; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 620px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .header p { font-size: 15px; color: #666; line-height: 1.5; }
  .card { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .field-group { margin-bottom: 1.25rem; }
  .field-group:last-child { margin-bottom: 0; }
  .field-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field-group input, .field-group textarea { width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a18; outline: none; transition: border-color 0.15s; }
  .field-group input:focus, .field-group textarea:focus { border-color: #888; background: #fff; }
  .field-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .run-btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; background: #1a1a18; color: #fff; border: none; border-radius: 8px; margin-top: 0.5rem; transition: opacity 0.15s; }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .error-msg { font-size: 13px; color: #c0392b; margin-top: 8px; display: none; }
  .output-wrap { display: none; margin-top: 1.5rem; }
  .output-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #27ae60; background: #eafaf1; border-radius: 20px; padding: 3px 10px; display: inline-block; margin-bottom: 1rem; }
  .output-section { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; }
  .output-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 10px; }
  .output-section p { font-size: 14px; line-height: 1.65; color: #1a1a18; }
  .output-section ul { padding-left: 1.2rem; }
  .output-section li { font-size: 14px; line-height: 1.65; color: #1a1a18; margin-bottom: 6px; }
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; justify-content: center; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: dot-pulse 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  .built-by { margin-top: 2rem; text-align: center; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>The 5-minute business brain</h1>
    <p>Say what's on your plate today and get a clear, prioritized action plan in seconds. Built for business owners.</p>
  </div>

  <div class="card">
    <div class="field-group">
      <label>Your main offer or service</label>
      <input type="text" id="offer" placeholder="e.g. 1:1 business coaching for female entrepreneurs" />
    </div>
    <div class="field-group">
      <label>What are you working on today?</label>
      <textarea id="working-on" placeholder="e.g. Follow up with 3 leads, finish my sales page, prep for a discovery call tomorrow"></textarea>
    </div>
    <div class="field-group">
      <label>Any blockers or decisions you're stuck on?</label>
      <textarea id="blockers" placeholder="e.g. Not sure whether to raise my prices or launch a group program first"></textarea>
    </div>
    <button class="run-btn" id="run-btn" onclick="runBrain()">Generate my plan</button>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <div class="output-wrap" id="output-wrap">
    <span class="output-label">Your plan is ready</span>
    <div class="output-section">
      <h3>Priorities for today</h3>
      <div id="out-priorities"></div>
    </div>
    <div class="output-section">
      <h3>On your blockers</h3>
      <div id="out-blockers"></div>
    </div>
    <div class="output-section">
      <h3>One marketing idea</h3>
      <div id="out-marketing"></div>
    </div>
  </div>



</div>

<script>
async function runBrain() {
  const offer = document.getElementById('offer').value.trim();
  const workingOn = document.getElementById('working-on').value.trim();
  const blockers = document.getElementById('blockers').value.trim();
  const btn = document.getElementById('run-btn');
  const errorMsg = document.getElementById('error-msg');
  const outputWrap = document.getElementById('output-wrap');

  errorMsg.style.display = 'none';

  if (!offer || !workingOn) {
    errorMsg.textContent = 'Fill in your offer and what you are working on to continue.';
    errorMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  outputWrap.style.display = 'none';

  const prompt = `You are a sharp, no-fluff business advisor for service-based female entrepreneurs. Be direct, warm, and practical. Never use filler phrases.

The business owner has shared the following:

OFFER/SERVICE: ${offer}

WORKING ON TODAY: ${workingOn}

BLOCKERS/DECISIONS: ${blockers || 'None shared'}

Respond in exactly this JSON format and nothing else. No markdown, no backticks, just raw JSON:
{
  "priorities": "A numbered list of 3 clear action items for today, ordered by impact. Each item on its own line starting with 1. 2. 3. One sentence each. No preamble.",
  "blockers": "A direct, practical response to their blocker or decision. 2-3 sentences max. Give a clear recommendation, not a list of options.",
  "marketing": "One specific, actionable marketing idea they can execute today or this week that is relevant to their offer. One sentence."
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('out-priorities').innerHTML = formatText(parsed.priorities);
    document.getElementById('out-blockers').innerHTML = formatText(parsed.blockers);
    document.getElementById('out-marketing').innerHTML = formatText(parsed.marketing);

    outputWrap.style.display = 'block';
  } catch (err) {
    errorMsg.textContent = 'Something went wrong generating your plan. Please try again.';
    errorMsg.style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = 'Generate my plan';
}

function formatText(text) {
  if (!text) return '';
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length > 1) {
    const items = lines.map(l => `<li>${l.replace(/^\d+\.\s*/, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  }
  return `<p>${text}</p>`;
}
</script>
</body>
</html>
